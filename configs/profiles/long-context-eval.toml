model = "gemma4"
server = "llama-cpp-long-context"
request = "streaming-chat"
presets = ["ctx-32k", "kv-cache-reuse"]

[context]
max_input_chars = 32000
strategy = "truncate_head"
persist_messages = false
system_prompt_path = "prompts/system/essay_feedback_system.md"

[runtime]
pid_file = "var/run/long-context-eval.pid"
log_file = "var/log/long-context-eval.log"
startup_timeout_seconds = 90
