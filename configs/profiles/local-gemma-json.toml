model = "gemma4"
server = "llama-cpp-kv-q8"
request = "json-chat"
presets = ["ctx-32k"]

[context]
max_input_chars = 32000
strategy = "truncate_head"
persist_messages = false
system_prompt_path = "prompts/system/essay_feedback_system.md"

[runtime]
pid_file = "var/run/local-gemma-json.pid"
log_file = "var/log/local-gemma-json.log"
startup_timeout_seconds = 60
